baseURL: "https://sauravmaheshkar.github.io"
title: Saurav :)
theme: ["PaperMod"]

languageCode: en-us

enableRobotsTXT: true
buildDrafts: false
enableEmoji: true

outputFormats:
  llms:
    mediaType: "text/plain"
    baseName: "llms"
    isPlainText: true
    notAlternative: true

outputs:
  home:
    - HTML
    - RSS
    - JSON
    - llms

menu:
  main:
    - identifier: Archives
      name: Archives
      url: /archives/
      weight: 10
    - identifier: Talks
      name: Talks
      url: /talks/
      weight: 20

params:
  defaultTheme: dark
  disableThemeToggle: true

  ShowPostNavLinks: true
  ShowCodeCopyButtons: true

  homeInfoParams:
    Title: "Hi there 👋"
    Content: >
      - I'm currently based in SF working at Tau Robotics

  socialIcons:
    - name: github
      url: "https://github.com/SauravMaheshkar"
    - name: twitter
      url: "https://twitter.com/MaheshkarSaurav"
    - name: linkedin
      url: "https://instagram.com/sauravvmaheshkar"
